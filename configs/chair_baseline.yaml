# configs/chair_baseline.yaml
# Baseline: contrastive only, no spatial/entropy/EMA

data_root    : /path/to/shapenetpart   # change this
obj_class    : 4                       # 4 = chair
num_points   : 1024
train_ratio  : 0.8
seed         : 42

batch_size   : 8
n_epochs     : 30
lr           : 3.0e-4
step_size    : 15
gamma        : 0.5

emb_dim      : 512
dgcnn_k      : 20
n_fg         : 256
n_bg         : 256

lambda_rep     : 0.5
lambda_spatial : 0.0     # disabled
k_spatial      : 10
lambda_entropy : 0.0     # disabled
lambda_ema     : 0.0     # disabled

use_mas       : false
use_ema       : false
ema_alpha     : 0.999
ema_warmup    : 5

save_dir      : results/chair_baseline
